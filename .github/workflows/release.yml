name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name for the release (e.g. v21)'
        required: true
        default: 'v21'
      name:
        description: 'Release name'
        required: true
        default: 'v21'
      body:
        description: 'Release body/notes'
        required: false
        default: 'Updating to latest release to match up to https://github.com/dawidd6/action-download-artifact/'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create tag and release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ github.event.inputs.tag }}';
            const name = '${{ github.event.inputs.name }}';
            const body = `${{ github.event.inputs.body }}`;

            // Create tag
            try {
              await github.rest.git.createRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `refs/tags/${tag}`,
                sha: context.sha,
              });
              core.info(`Created tag ${tag}`);
            } catch (e) {
              if (e.status === 422) {
                core.warning(`Tag ${tag} already exists`);
              } else {
                throw e;
              }
            }

            // Create release
            const release = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: name,
              body: body,
              draft: false,
              prerelease: false,
            });
            core.info(`Created release: ${release.data.html_url}`);
